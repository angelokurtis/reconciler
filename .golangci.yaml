issues:
  exclude-rules:
    - linters: [ wrapcheck ]
      text: "error returned from interface method should be wrapped"
  max-issues-per-linter: 0
  max-same-issues: 0
linters:
  disable:
    - scopelint # replaced by 'exportloopref'
    - maligned # replaced by govet 'fieldalignment'
    - gci
    - exhaustivestruct
  enable:
    - predeclared
    - nolintlint
    - lll
    - importas
    - ifshort
    - gochecknoinits
    - gochecknoglobals
  presets:
    - unused
    - test
    - performance
    - module
    - metalinter
    - import
    - format
    - error
    - comment
    - bugs
linters-settings:
  importas:
    alias:
      - alias: kerrors
        pkg: k8s\.io/apimachinery/pkg/api/errors
    no-unaliased: true
  wrapcheck:
    ignorePackageGlobs:
      - github.com/angelokurtis/reconciler/*
output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  sort-results: true
run:
  issues-exit-code: 1
  tests: false
  timeout: 10m
